<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room | KaCHAT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href = "../css/room.css" />
    <link rel="stylesheet" href = "../css/video.css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css">
    <script src ="//cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
</head>
<body>
    <div class="room-container">
        <div class="header-box">
            <h3>KaCHAT</h3>
            <div class ="room-info">
                <p>Room ID: <span id ="room_id"></span> |</p>
                <p>Active users: <span id="active-users"></span></p>
                <input type="color" value ="#EDAC1A" id ="color-picker"/>
                <button class="btn-leave" id ="leave">Leave Chat</button>
            </div>
        </div>
        <div class="chat-container"></div>
        <form id="send-message" class="actions" autocomplete="off">
            <input type ="text" id="input-msg" autofocus class="input-msg" placeholder="Enter your message"/>
            <input type ="submit" id="send-msg" value="Send" class="send-msg" />
        </form>
    </div>
    <!--<p class="update-browser">Please update your browser or use PC for better experience.</p>-->>
</body>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/room.js"></script>
</html>
